name: Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: lumina-backend
  ECS_CLUSTER: lumina-cluster
  ECS_SERVICE: lumina-backend
  CONTAINER_NAME: lumina-backend

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition --task-definition lumina-backend \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Set up Node for smoke tests
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Export credentials and backend URL for smoke tests
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id arn:aws:secretsmanager:eu-west-2:179598271525:secret:lumina/app-secrets-gU1u8K \
            --query SecretString --output text)
          echo "SMOKE_SUPABASE_URL=$(echo "$SECRET" | jq -r '.SUPABASE_URL')" >> "$GITHUB_ENV"
          echo "SMOKE_SUPABASE_SERVICE_KEY=$(echo "$SECRET" | jq -r '.SUPABASE_SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"
          # Derive the backend API URL from the ALB attached to the ECS service.
          # /client-ip on this URL returns the exact IP the backend records in ip_quotas.
          TARGET_GROUP_ARN=$(aws ecs describe-services \
            --cluster lumina-cluster --services lumina-backend \
            --query "services[0].loadBalancers[0].targetGroupArn" --output text)
          LB_ARN=$(aws elbv2 describe-target-groups \
            --target-group-arns "$TARGET_GROUP_ARN" \
            --query "TargetGroups[0].LoadBalancerArns[0]" --output text)
          LB_DNS=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns "$LB_ARN" \
            --query "LoadBalancers[0].DNSName" --output text)
          echo "SMOKE_API_URL=https://$LB_DNS" >> "$GITHUB_ENV"

      - name: Run smoke tests against production
        working-directory: frontend
        run: npx playwright test --config playwright.smoke.config.ts

      - name: Upload smoke test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: frontend/playwright-report/
          retention-days: 7
